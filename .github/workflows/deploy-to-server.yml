# this will deploy the safe / secure / tested app to Prod server
name: Deploy To Server

on: 
    workflow_call:

permissions:
  contents: read

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: SSH to Prod server & create app folder
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USER }}
                key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
                script: |
                 echo "Installing required packages & folders"
                 sudo apt-get update && sudo apt-get install docker.io -y
                 sudo usermod -aG docker $USER
                 mkdir -p ~/python-k8s-app
              
            - name: SSH to Prod server & run the app
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USER }}
                key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
                script: |
                 echo "Running App"
                 cd ~/python-k8s-app
                 cat > .env << 'EOF'
                 DOCKERHUB_USER=${{ secrets.DOCKERHUB_USERNAME }}
                 DOCKER_TAG=${{ github.sha }}
                 EOF
                 cat .env
                 echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
                 echo "Pulling latest image"
                 docker pull ${{ secrets.DOCKERHUB_USERNAME }}/python-k8s-app:${{ github.sha }}
                 echo "Stopping existing container"
                 docker stop python-k8s-app || true
                 docker rm python-k8s-app || true
                 echo "Starting New Container"
                 docker run -d \
                    --name python-k8s-app \
                    --restart always \
                    -p 8080:8080 \
                    -e POD_NAMESPACE=prod \
                    -e NODE_NAME=$(hostname) \
                    ${{ secrets.DOCKERHUB_USERNAME }}/python-k8s-app:${{ github.sha }}

                 echo "Cleaning up old images"
                 docker image prune -f
                 echo "Container status"
                 docker ps | grep python-k8s-app