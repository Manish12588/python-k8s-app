apiVersion: v1
kind: Pod
metadata:
  name: python-app
  labels:
    app: python-app
spec:
  containers:
    - name: python-app-container
      image: YOUR_DOCKERHUB_USERNAME/python-k8s-app:latest
      ports:
        - containerPort: 5000
      env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName

---
apiVersion: v1
kind: Service
metadata:
  name: python-app-service
spec:
  selector:
    app: python-app
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30002
  type: NodePort
