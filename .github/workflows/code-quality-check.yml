# Linting and SAST (Static Application Security Testing) scan
# Lint - Checkstyle (Equivalent to ESLint)
# SAST - SpotBugs (Equivalent to njsscan)

name: Code Quality Check

on:    
    workflow_dispatch:
    #workflow_call:

permissions:
  contents: read
      
jobs:
  validate:
    name: Lint and SAST Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: setup python version 3.12
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: run linter
        run: flake8 app.py 

      - name: run SAST 
        run: bandit -r app.py