# uses Trivy image scanner for CVEs - Docker Image
name: Image Scanner

on: 
    workflow_call:

permissions:
  contents: read

jobs:
    image-scanner:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
              
            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME  }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}
            
            - name: Pull Image from Docker Hub
              run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/java-k8s-app:${{ github.sha }}

            - name: Trivy Scanner
              uses: aquasecurity/trivy-action@0.35.0
              with:
                image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/java-k8s-app:${{ github.sha }}
                severity: 'CRITICAL,HIGH'
                format: 'table'
                exit-code: '1'
                ignore-unfixed: true
                trivyignores: .trivyignore
            
            - name: Show Trivy table summary in logs
              if: always()
              uses: aquasecurity/trivy-action@0.35.0
              with:
                image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/java-k8s-app:${{ github.sha }}
                format: 'sarif'
                output: 'trivy-results.sarif'
                severity: 'CRITICAL,HIGH'
                ignore-unfixed: true
                exit-code: '0'

            #- name: Upload SARIF to GitHub Security tab
            #  uses: github/codeql-action/upload-sarif@v3
            #  if: always()
            #  with:
            #    sarif_file: 'trivy-results.sarif'